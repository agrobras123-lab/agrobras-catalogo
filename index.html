<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agrobras — Tabela de Preços</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ─── Reset & Base ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-900: #0d2b1a;
    --green-800: #14391f;
    --green-700: #1a4a28;
    --green-600: #1f5c2f;
    --green-500: #247a38;
    --green-400: #2e9a47;
    --green-300: #4db86a;
    --green-100: #d0f0d8;
    --green-50:  #edfaf1;

    --amber: #f5a623;
    --amber-light: #fef3da;

    --text-primary:   #0d1f12;
    --text-secondary: #4a6654;
    --text-muted:     #8aa891;
    --surface:        #ffffff;
    --surface-2:      #f5faf6;
    --border:         #daeee0;
    --border-strong:  #b5d9be;

    --shadow-sm: 0 1px 3px rgba(13,43,26,.06), 0 1px 2px rgba(13,43,26,.04);
    --shadow-md: 0 4px 16px rgba(13,43,26,.10), 0 2px 4px rgba(13,43,26,.05);
    --shadow-lg: 0 12px 40px rgba(13,43,26,.15);

    --radius: 14px;
    --radius-sm: 8px;
    --radius-xs: 5px;

    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    background: var(--surface-2);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Header ─── */
  header {
    background: var(--green-800);
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }

  .header-inner {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 58px;
    gap: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--green-400);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .logo-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -.2px;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--green-300);
    font-weight: 400;
    letter-spacing: .5px;
    text-transform: uppercase;
  }

  .header-badge {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--green-100);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }

  .pulse-dot {
    width: 6px;
    height: 6px;
    background: var(--green-300);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: .5; transform: scale(.8); }
  }

  /* ─── Update bar ─── */
  .update-bar {
    background: var(--green-900);
    padding: 7px 16px;
  }

  .update-inner {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .update-label {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #last-update {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green-300);
  }

  .refresh-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    padding: 2px;
    border-radius: 4px;
    transition: color .2s;
    display: flex;
    align-items: center;
  }
  .refresh-btn:hover { color: var(--green-300); }

  /* ─── Search ─── */
  .search-wrap {
    padding: 14px 16px 8px;
    max-width: 480px;
    margin: 0 auto;
  }

  .search-box {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-icon {
    position: absolute;
    left: 13px;
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }

  #search-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px 10px 38px;
    font-family: var(--font);
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  #search-input:focus {
    border-color: var(--green-400);
    box-shadow: 0 0 0 3px rgba(46,154,71,.12);
  }

  #search-input::placeholder { color: var(--text-muted); }

  /* ─── Category pills ─── */
  .cats-wrap {
    padding: 0 16px 12px;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .cats-wrap::-webkit-scrollbar { display: none; }

  .cats {
    display: flex;
    gap: 6px;
    width: max-content;
  }

  .cat-pill {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    user-select: none;
  }

  .cat-pill:hover { border-color: var(--green-400); color: var(--green-600); }

  .cat-pill.active {
    background: var(--green-600);
    border-color: var(--green-600);
    color: #fff;
  }

  /* ─── Product list ─── */
  .list-wrap {
    padding: 0 16px 100px;
    max-width: 480px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: .8px;
    text-transform: uppercase;
    padding: 10px 0 8px;
  }

  .product-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }

  .product-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--green-400);
    transform: scaleY(0);
    transition: transform .2s;
    border-radius: 3px 0 0 3px;
  }

  .product-card:hover,
  .product-card:active {
    border-color: var(--green-300);
    box-shadow: var(--shadow-md);
    transform: translateX(1px);
  }

  .product-card:hover::before,
  .product-card.selected::before {
    transform: scaleY(1);
  }

  .product-card.selected {
    border-color: var(--green-400);
    background: var(--green-50);
  }

  .product-emoji {
    width: 40px;
    height: 40px;
    background: var(--surface-2);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .product-info {
    flex: 1;
    min-width: 0;
  }

  .product-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .product-unit {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .product-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
    flex-shrink: 0;
  }

  .product-price {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--green-600);
    letter-spacing: -.5px;
  }

  .add-btn {
    width: 26px;
    height: 26px;
    background: var(--green-600);
    border: none;
    border-radius: 7px;
    color: #fff;
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, transform .1s;
  }

  .add-btn:active { transform: scale(.9); }
  .product-card.selected .add-btn { background: var(--green-400); }

  .qty-badge {
    position: absolute;
    top: -5px; right: -5px;
    background: var(--amber);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    display: none;
  }

  .qty-control {
    display: none;
    align-items: center;
    gap: 6px;
  }

  .qty-btn {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    border: 1.5px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }

  .qty-btn:active { transform: scale(.9); }

  .qty-num {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--green-600);
    min-width: 18px;
    text-align: center;
  }

  /* ─── Empty state ─── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    display: none;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty h3 { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
  .empty p { font-size: 13px; }

  /* ─── Loading skeleton ─── */
  .skeleton {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    margin-bottom: 8px;
  }

  .skel-box {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ─── Cart bar ─── */
  .cart-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    padding: 12px 16px max(16px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1.5px solid var(--border);
    box-shadow: 0 -4px 24px rgba(13,43,26,.10);
    z-index: 200;
    transform: translateY(120%);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  }

  .cart-bar.visible { transform: translateY(0); }

  .cart-inner {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cart-summary {
    flex: 1;
    min-width: 0;
  }

  .cart-count {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 1px;
  }

  .cart-total {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -.5px;
  }

  .cart-btn {
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    transition: background .15s, transform .1s, box-shadow .2s;
    box-shadow: 0 4px 14px rgba(37,211,102,.35);
  }

  .cart-btn:active { transform: scale(.97); }
  .cart-btn:hover { background: #20bc5a; box-shadow: 0 6px 20px rgba(37,211,102,.45); }

  .wha-icon { font-size: 18px; }

  /* ─── Order modal ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,43,26,.55);
    backdrop-filter: blur(4px);
    z-index: 300;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 0 0 max(24px, env(safe-area-inset-bottom));
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp .3s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 14px auto 0;
  }

  .modal-header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .modal-title { font-size: 17px; font-weight: 600; }

  .modal-close {
    width: 30px; height: 30px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: background .15s;
  }

  .modal-close:hover { background: var(--border); }

  .modal-body { padding: 12px 20px; }

  .order-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }

  .order-item:last-child { border-bottom: none; }

  .order-item-name {
    font-size: 13px;
    font-weight: 500;
    flex: 1;
    line-height: 1.3;
  }

  .order-item-detail {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .order-item-price {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--green-600);
    font-weight: 500;
    flex-shrink: 0;
  }

  .order-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-top: 2px solid var(--border);
    margin-top: 4px;
  }

  .order-total-label { font-size: 14px; font-weight: 600; }

  .order-total-val {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--green-600);
  }

  .whatsapp-btn {
    margin: 4px 20px 0;
    width: calc(100% - 40px);
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 15px 20px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background .15s, transform .1s, box-shadow .2s;
    box-shadow: 0 4px 16px rgba(37,211,102,.35);
  }

  .whatsapp-btn:active { transform: scale(.98); }
  .whatsapp-btn:hover { background: #20bc5a; }

  .clear-btn {
    margin: 10px 20px 0;
    width: calc(100% - 40px);
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 11px 20px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }

  .clear-btn:hover { border-color: #e57373; color: #e57373; }

  /* ─── Error state ─── */
  .error-bar {
    background: #fef3da;
    border: 1px solid #f5a623;
    border-radius: 10px;
    padding: 10px 14px;
    margin: 14px 16px;
    max-width: 448px;
    margin-left: auto; margin-right: auto;
    font-size: 12px;
    color: #9a6000;
    display: none;
    align-items: center;
    gap: 8px;
  }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
</style>
</head>

// ─────────────────────────────────────────────
//  EMOJIS POR PRODUTO/CATEGORIA
// ─────────────────────────────────────────────
function getEmoji(p) {
  const n = (p.name || '').toLowerCase();
  const c = (p.category || '').toLowerCase();

  // Frutas
  if (n.includes('abacate'))    return '🥑';
  if (n.includes('abacaxi'))    return '🍍';
  if (n.includes('banana'))     return '🍌';
  if (n.includes('goiaba'))     return '🍈';
  if (n.includes('laranja'))    return '🍊';
  if (n.includes('limão') || n.includes('limao')) return '🍋';
  if (n.includes('mamão') || n.includes('mamao')) return '🍈';
  if (n.includes('melão') || n.includes('melao')) return '🍈';
  if (n.includes('melancia'))   return '🍉';
  if (n.includes('maçã') || n.includes('maca'))   return '🍎';
  if (n.includes('morango'))    return '🍓';
  if (n.includes('manga'))      return '🥭';
  if (n.includes('maracujá') || n.includes('maracuja')) return '🌸';
  if (n.includes('kiwi'))       return '🥝';
  if (n.includes('uva'))        return '🍇';

  // Legumes / tubérculos
  if (n.includes('batata doce')) return '🍠';
  if (n.includes('batata'))     return '🥔';
  if (n.includes('cebola'))     return '🧅';
  if (n.includes('cenoura'))    return '🥕';
  if (n.includes('chuchu'))     return '🫑';
  if (n.includes('tomate'))     return '🍅';
  if (n.includes('pimentão') || n.includes('pimentao')) return '🫑';
  if (n.includes('pepino'))     return '🥒';
  if (n.includes('abóbora') || n.includes('abobora')) return '🎃';
  if (n.includes('abobrinha'))  return '🥒';
  if (n.includes('beterraba'))  return '🫀';
  if (n.includes('berinjela'))  return '🍆';
  if (n.includes('vagem'))      return '🫘';
  if (n.includes('quiabo'))     return '🌿';
  if (n.includes('mandioquinha')) return '🥕';

  // Hortaliças
  if (n.includes('alface'))     return '🥬';
  if (n.includes('couve-flor') || n.includes('couve flor')) return '🥦';
  if (n.includes('couve'))      return '🥬';
  if (n.includes('rúcula') || n.includes('rucula')) return '🌿';
  if (n.includes('agrião') || n.includes('agriao')) return '🌿';
  if (n.includes('brócolis') || n.includes('brocolis')) return '🥦';
  if (n.includes('repolho'))    return '🥬';
  if (n.includes('acelga'))     return '🥬';
  if (n.includes('espinafre'))  return '🥬';
  if (n.includes('cebolinha'))  return '🌱';
  if (n.includes('coentro'))    return '🌿';
  if (n.includes('salsão'))     return '🌿';
  if (n.includes('salsa'))      return '🌿';
  if (n.includes('alho porrô') || n.includes('alho porro')) return '🧅';
  if (n.includes('alecrim'))    return '🌿';
  if (n.includes('hortelã') || n.includes('hortela')) return '🌿';
  if (n.includes('manjericão') || n.includes('manjericao')) return '🌿';
  if (n.includes('escarola'))   return '🥬';
  if (n.includes('catalonia'))  return '🥬';
  if (n.includes('rabanete'))   return '🌹';

  // Temperos / alho
  if (n.includes('alho'))       return '🧄';
  if (n.includes('tempero'))    return '🫙';
  if (n.includes('orégano') || n.includes('oregano')) return '🌿';
  if (n.includes('açafrão') || n.includes('acafrao')) return '🌼';
  if (n.includes('coloral'))    return '🌶️';
  if (n.includes('caldo'))      return '🍲';

  // Ovos
  if (n.includes('ovo') || n.includes('codorna')) return '🥚';

  // Conservas
  if (n.includes('azeitona'))   return '🫒';
  if (n.includes('palmito'))    return '🌴';
  if (n.includes('champignon')) return '🍄';
  if (n.includes('pimenta'))    return '🌶️';
  if (n.includes('tomate seco')) return '🍅';
  if (n.includes('alcaparra') || n.includes('alcaparras')) return '🫙';
  if (n.includes('picles'))     return '🥒';
  if (n.includes('pepino em conserva')) return '🥒';

  // Fallback por categoria
  if (c === 'frutas')     return '🍑';
  if (c === 'legumes')    return '🥦';
  if (c === 'hortalicas') return '🥬';
  if (c === 'temperos')   return '🧄';
  if (c === 'ovos')       return '🥚';
  if (c === 'conservas')  return '🫙';

  return '🌱';
}

// ─────────────────────────────────────────────
//  CARREGAMENTO
// ─────────────────────────────────────────────
async function loadProducts() {
  if (!JSON_URL) {
    setData(DEMO_DATA);
    return;
  }

  try {
    const resp = await fetch(JSON_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    // JSONbin envolve o conteudo em { record: { ... } }
    const data = json.record || json;
    setData(data);
    hideError();
  } catch (e) {
    console.warn('Fetch falhou:', e);
    showError('Não foi possível carregar os preços. Exibindo dados em cache.');
    if (allProducts.length === 0) setData(DEMO_DATA);
  }
}

function setData(data) {
  allProducts = data.products || [];

  // Atualiza horário
  if (data.updatedAt) {
    const d = new Date(data.updatedAt);
    document.getElementById('last-update').textContent =
      d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  }

  document.getElementById('skeletons').style.display = 'none';
  buildCats();
  renderList();
}

// ─────────────────────────────────────────────
//  CATEGORIAS
// ─────────────────────────────────────────────
function buildCats() {
  const cats = ['Todos', ...new Set(allProducts.map(p => p.category).filter(Boolean))];
  const el = document.getElementById('cats');
  el.innerHTML = cats.map(c => `
    <button class="cat-pill${c === activeCategory ? ' active' : ''}"
            onclick="setCategory('${c}')">${c}</button>
  `).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  buildCats();
  renderList();
}

// ─────────────────────────────────────────────
//  RENDERIZAÇÃO DA LISTA
// ─────────────────────────────────────────────
function renderList() {
  const q = searchQuery.toLowerCase().trim();

  const filtered = allProducts.filter(p => {
    const matchCat    = activeCategory === 'Todos' || p.category === activeCategory;
    const matchSearch = !q || p.name.toLowerCase().includes(q)
                             || (p.category || '').toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  const emptyEl = document.getElementById('empty');
  const listEl  = document.getElementById('product-list');

  if (filtered.length === 0) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }

  emptyEl.style.display = 'none';

  // Group by category
  const groups = {};
  filtered.forEach(p => {
    const cat = p.category || 'Outros';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(p);
  });

  let html = '';
  const showLabels = activeCategory === 'Todos' && !q;

  Object.entries(groups).forEach(([cat, prods]) => {
    if (showLabels) html += `<div class="section-label">${cat}</div>`;
    prods.forEach(p => {
      const qty     = cart[p.id] || 0;
      const selected = qty > 0;
      html += `
      <div class="product-card${selected ? ' selected' : ''}" id="card-${p.id}" onclick="toggleProduct(${p.id})">
        <div class="product-emoji">${getEmoji(p)}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-unit">por ${p.unit || 'unidade'}</div>
        </div>
        <div class="product-right">
          <div class="product-price">R$ ${fmt(p.price)}</div>
          <div style="position:relative">
            ${selected
              ? `<div class="qty-control" id="qty-${p.id}" style="display:flex">
                   <button class="qty-btn" onclick="changeQty(event,${p.id},-1)">−</button>
                   <span class="qty-num">${qty}</span>
                   <button class="qty-btn" onclick="changeQty(event,${p.id},+1)">+</button>
                 </div>`
              : `<button class="add-btn" onclick="event.stopPropagation();addFirst(${p.id})">+</button>`
            }
          </div>
        </div>
      </div>`;
    });
  });

  listEl.innerHTML = html;
}

// ─────────────────────────────────────────────
//  CARRINHO
// ─────────────────────────────────────────────
function addFirst(id) {
  cart[id] = 1;
  updateCartBar();
  renderList();
}

function toggleProduct(id) {
  if (!cart[id]) {
    cart[id] = 1;
    updateCartBar();
    renderList();
  }
}

function changeQty(e, id, delta) {
  e.stopPropagation();
  const current = cart[id] || 0;
  const next    = current + delta;
  if (next <= 0) {
    delete cart[id];
  } else {
    cart[id] = next;
  }
  updateCartBar();
  renderList();
}

function updateCartBar() {
  const items  = Object.entries(cart);
  const count  = items.reduce((a, [, q]) => a + q, 0);
  const total  = items.reduce((a, [id, q]) => {
    const p = allProducts.find(x => x.id == id);
    return a + (p ? p.price * q : 0);
  }, 0);

  document.getElementById('cart-count').textContent = count + (count === 1 ? ' item' : ' itens');
  document.getElementById('cart-total').textContent  = 'R$ ' + fmt(total);

  const bar = document.getElementById('cart-bar');
  count > 0 ? bar.classList.add('visible') : bar.classList.remove('visible');
}

function clearCart() {
  cart = {};
  updateCartBar();
  renderList();
  closeModal();
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal() {
  const items = Object.entries(cart).filter(([, q]) => q > 0);
  let bodyHTML = '';
  let total = 0;

  items.forEach(([id, qty]) => {
    const p = allProducts.find(x => x.id == id);
    if (!p) return;
    const sub = p.price * qty;
    total += sub;
    bodyHTML += `
    <div class="order-item">
      <div>
        <div class="order-item-name">${p.emoji || ''} ${p.name}</div>
        <div class="order-item-detail">${qty} ${p.unit} × R$ ${fmt(p.price)}</div>
      </div>
      <div class="order-item-price">R$ ${fmt(sub)}</div>
    </div>`;
  });

  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-total').textContent = 'R$ ' + fmt(total);
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ─────────────────────────────────────────────
//  WHATSAPP
// ─────────────────────────────────────────────
function sendWhatsApp() {
  const items = Object.entries(cart).filter(([, q]) => q > 0);
  const now   = new Date().toLocaleDateString('pt-BR') + ' às ' +
                new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

  let msg = `🌿 *Pedido — ${COMPANY_NAME}*\n📅 ${now}\n\n`;

  let total = 0;
  items.forEach(([id, qty]) => {
    const p = allProducts.find(x => x.id == id);
    if (!p) return;
    const sub = p.price * qty;
    total += sub;
    msg += `• ${p.name}: ${qty} ${p.unit} × R$ ${fmt(p.price)} = *R$ ${fmt(sub)}*\n`;
  });

  msg += `\n💰 *Total estimado: R$ ${fmt(total)}*\n\nAguardo confirmação e disponibilidade. Obrigado!`;

  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function fmt(n) {
  return Number(n).toFixed(2).replace('.', ',');
}

function showError(msg) {
  const bar = document.getElementById('error-bar');
  document.getElementById('error-msg').textContent = msg;
  bar.style.display = 'flex';
}

function hideError() {
  document.getElementById('error-bar').style.display = 'none';
}

// ─────────────────────────────────────────────
//  SEARCH
// ─────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderList();
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
loadProducts();

// Auto-refresh a cada 15 minutos
setInterval(loadProducts, 15 * 60 * 1000);
</script>
